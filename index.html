<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Framework Hub</title>


<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}


header {
    padding: 20px;
    text-align: center;
    background: #020617;
    font-size: 24px;
    font-weight: bold;
}


/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}


.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}


h2 {
    color: #38bdf8;
}


/* BUTTONS */
button {
    background: #38bdf8;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 6px;
}


/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
}


.modal-content {
    background: #1e293b;
    padding: 20px;
    width: 90%;
    max-width: 600px;
    border-radius: 10px;
}


/* SECTION */
.section {
    margin-top: 10px;
}


select {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
}
</style>
</head>


<body>


<header>🔐 Cybersecurity Framework Hub</header>


<!-- MAIN GRID -->
<div class="container">


<!-- 🔍 SOLVE A PROBLEM -->
<div class="card">
    <h2>🔍 Solve a Security Problem</h2>
    
    <select id="problemSelect">
        <option value="">-- Select a Problem --</option>
        <option value="phishing">Phishing Attack</option>
        <option value="ransomware">Ransomware</option>
        <option value="webhack">Web App Breach</option>
    </select>


    <button onclick="solveProblem()">Analyze</button>


    <div id="solutionOutput" class="section"></div>
</div>


<!-- 📊 MITRE INTERACTIVE -->
<div class="card">
    <h2>📊 ATT&CK Technique Explorer</h2>


    <select id="mitreSelect">
        <option value="">-- Select Technique --</option>
        <option value="phishing">Phishing (T1566)</option>
        <option value="credential">Credential Dumping (T1003)</option>
        <option value="lateral">Lateral Movement (T1021)</option>
    </select>


    <button onclick="showMitre()">Explore</button>


    <div id="mitreOutput" class="section"></div>
</div>


<!-- 🧪 SCENARIOS -->
<div class="card">
    <h2>🧪 Incident Scenarios</h2>


    <button onclick="loadScenario()">Load Scenario</button>


    <div id="scenarioOutput" class="section"></div>
</div>


</div>


<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
</div>


<script>


/* 🔍 SOLVE PROBLEM */
function solveProblem() {
    let problem = document.getElementById("problemSelect").value;
    let output = document.getElementById("solutionOutput");


    if(problem === "phishing") {
        output.innerHTML = `
        <b>Frameworks to Use:</b><br>
        - NIST: Respond & Recover<br>
        - MITRE: Initial Access (Phishing)<br>
        - CIS Controls<br><br>


        <b>Steps:</b>
        <ul>
            <li>Identify compromised users</li>
            <li>Reset credentials</li>
            <li>Analyze email headers</li>
            <li>Block malicious domains</li>
        </ul>`;
    }


    if(problem === "ransomware") {
        output.innerHTML = `
        <b>Frameworks:</b><br>
        - NIST Incident Response<br>
        - MITRE Execution & Impact<br><br>


        <b>Steps:</b>
        <ul>
            <li>Isolate infected systems</li>
            <li>Check backups</li>
            <li>Analyze attack vector</li>
            <li>Patch vulnerabilities</li>
        </ul>`;
    }


    if(problem === "webhack") {
        output.innerHTML = `
        <b>Frameworks:</b><br>
        - OWASP Top 10<br><br>


        <b>Steps:</b>
        <ul>
            <li>Check logs for injection</li>
            <li>Validate inputs</li>
            <li>Fix authentication flaws</li>
        </ul>`;
    }
}


/* 📊 MITRE */
function showMitre() {
    let val = document.getElementById("mitreSelect").value;
    let output = document.getElementById("mitreOutput");


    if(val === "phishing") {
        output.innerHTML = `
        <b>Phishing (T1566)</b><br>
        Detection:
        <ul>
            <li>Email gateway logs</li>
            <li>User reports</li>
        </ul>
        Mitigation:
        <ul>
            <li>Security awareness training</li>
            <li>Email filtering</li>
        </ul>`;
    }


    if(val === "credential") {
        output.innerHTML = `
        <b>Credential Dumping</b><br>
        Detection:
        <ul>
            <li>LSASS access alerts</li>
            <li>EDR triggers</li>
        </ul>`;
    }


    if(val === "lateral") {
        output.innerHTML = `
        <b>Lateral Movement</b><br>
        Detection:
        <ul>
            <li>Unusual SMB traffic</li>
            <li>Remote login anomalies</li>
        </ul>`;
    }
}


/* 🧪 SCENARIO */
function loadScenario() {
    let output = document.getElementById("scenarioOutput");


    output.innerHTML = `
    <b>Scenario:</b> Employee reports locked files and ransom note.<br><br>


    <b>Analysis:</b>
    <ul>
        <li>MITRE: Impact (Data Encrypted)</li>
        <li>NIST: Respond Phase</li>
        <li>CIS: Backup & Recovery</li>
    </ul>


    <button onclick="openModal()">View Response Plan</button>
    `;
}


function openModal() {
    document.getElementById("modal").style.display = "flex";


    document.getElementById("modalContent").innerHTML = `
    <h3>Incident Response Plan</h3>
    <ul>
        <li>Isolate system</li>
        <li>Notify SOC</li>
        <li>Restore from backup</li>
        <li>Conduct root cause analysis</li>
    </ul>
    <button onclick="closeModal()">Close</button>
    `;
}


function closeModal() {
    document.getElementById("modal").style.display = "none";
}


</script>


</body>
</html>
