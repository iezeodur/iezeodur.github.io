<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia|Trirong|Cinzel|Sacramento|Gochi Hand">
<title>afrodaemon</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Trirong|Cinzel">

<style>
header {
  color: black;
  font-family: rubik, sans-serif;
  font-size: 25px;
  text-align: center;
  background: #e8dccf; 
}
header p {
  color: black;
  font-family: "Cinzel", sans-serif;
  font-size: 15px;
  text-align: center;
  background: #ffc539; 
}
body {
  font-family: sans-serif;
  background: #f5efe7;
  color: #e2e8f0;
  padding: 10px;
}

.feed-container {
  max-width: 900px;
  margin: auto;
}

.post {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  transition: 0.2s;
}

.post:hover { background: #334155; }

.post-content {
  display: flex;
  gap: 15px;
  align-items: flex-start;
}

.thumb {
  width: 120px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  flex-shrink: 0;
  transition: transform 0.2s;
}

.post:hover .thumb {
  transform: scale(1.05);
}

.post-text {
  flex: 1;
}

.post a {
  color: #38bdf8;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
}

.desc {
  font-size: 14px;
  color: #cbd5f5;
  margin: 6px 0 8px 0;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.meta {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 5px;
}

.source {
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 5px;
  margin-left: 5px;
}

.krebs { color: #facc15; }
.bleep { color: #4ade80; }
.secweek { color: #fb7185; }
.hacker { color: #a78bfa; }

.cve {
  margin-top: 5px;
  font-size: 12px;
  background: #334155;
  padding: 5px;
  border-radius: 5px;
}

@media (max-width: 600px) {
  .post-content {
    flex-direction: column;
  }

  .thumb {
    width: 100%;
    height: 180px;
  }
}

footer {
  text-align: center;
  padding: 20px;
  background: #ce5c38;
}
</style>
</head>



<body>
<header>
  <a href="https://iezeodur.github.io/securitydashboard.html">afrodaemon</a>
  <p font-size: 1px;> 👨🏿‍💻 Cybersecurity News & CVE Dashboard</p>
</header>
<div class="feed-container" id="feed"></div>

<script>
// --- FEEDS CONFIG ---
const feeds = [
  { url: "https://api.rss2json.com/v1/api.json?rss_url=https://krebsonsecurity.com/feed/", source: "Krebs", class: "krebs" },
  { url: "https://api.rss2json.com/v1/api.json?rss_url=https://www.bleepingcomputer.com/feed/", source: "BleepingComputer", class: "bleep" },
  { url: "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/securityweek", source: "SecurityWeek", class: "secweek" },
  { url: "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/TheHackersNews", source: "Hacker News", class: "hacker" }
];

const cveRegex = /CVE-\d{4}-\d{4,7}/gi;

// --- CLEAN DESCRIPTION ---
function cleanDescription(html) {
  if (!html) return "";

  let text = html.replace(/<[^>]*>/g, "");

  const txt = document.createElement("textarea");
  txt.innerHTML = text;
  text = txt.value;

  return text.length > 180 ? text.substring(0, 180) + "..." : text;
}

// --- LOAD FEEDS ---
async function loadFeeds() {
  let allPosts = [];

  for (let feed of feeds) {
    try {
      const res = await fetch(feed.url);
      const data = await res.json();

      const posts = data.items.map(item => {
        const fullText = (item.title || "") + " " + (item.description || "");

        // --- IMAGE EXTRACTION ---
        let image = item.thumbnail || "";

        if (!image && item.enclosure && item.enclosure.link) {
          image = item.enclosure.link;
        }

        if (!image && item.description) {
          const imgMatch = item.description.match(/<img.*?src="(.*?)"/i);
          if (imgMatch) image = imgMatch[1];
        }

        const cveData = extractCVEData(fullText, item.title || "", item.link);

        return {
          title: item.title,
          link: item.link,
          date: new Date(item.pubDate),
          source: feed.source,
          class: feed.class,
          cves: cveData,
          image: image,
          description: cleanDescription(item.description)
        };
      });

      allPosts = allPosts.concat(posts);
    } catch (err) {
      console.error("Feed error:", err);
    }
  }

  allPosts.sort((a, b) => b.date - a.date);
  displayPosts(allPosts.slice(0, 15));
}

// --- DISPLAY POSTS ---
function displayPosts(posts) {
  const container = document.getElementById("feed");
  container.innerHTML = "";

  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    const cveList = post.cves.map(c => `
      <div class="cve">
        🔎 <strong>${c.cve}</strong>
        ${c.severity ? ` | Severity: ${c.severity}` : ""}
        ${c.cvss ? ` | CVSS: ${c.cvss}` : ""}
        ${c.software.length ? ` | Software: ${c.software.join(", ")}` : ""}
        <br>${c.description}
      </div>
    `).join("");

    div.innerHTML = `
      <div class="post-content">
        ${post.image ? `<img src="${post.image}" class="thumb">` : ""}
        
        <div class="post-text">
          <a href="${post.link}" target="_blank">${post.title}</a>

          <p class="desc">${post.description}</p>

          <div class="meta">
            ${post.date.toLocaleString()} • 
            <span class="source ${post.class}">${post.source}</span>
          </div>

          ${cveList}
        </div>
      </div>
    `;

    container.appendChild(div);
  });
}

// --- CVE EXTRACTION ---
function extractCVEData(text, title, link) {
  const results = [];
  const cves = text.match(cveRegex) || [];

  cves.forEach(cve => {
    results.push({
      cve: cve.toUpperCase(),
      article: title,
      link: link,
      description: extractDescription(text, cve),
      software: extractSoftware(text),
      severity: extractSeverity(text),
      cvss: extractCVSS(text)
    });
  });

  return results;
}

function extractDescription(text, cve) {
  const index = text.indexOf(cve);
  if (index === -1) return "";
  return text.substring(Math.max(0, index - 100), index + 150).replace(/\s+/g, " ");
}

function extractSoftware(text) {
  const keywords = ["Windows", "Linux", "Apache", "NGINX", "Chrome", "Firefox", "Android", "iOS", "Cisco", "VMware", "Microsoft"];
  return keywords.filter(k => text.includes(k));
}

function extractSeverity(text) {
  const levels = ["Critical", "High", "Medium", "Low"];
  for (let level of levels) {
    if (text.toLowerCase().includes(level.toLowerCase())) return level;
  }
  return "Unknown";
}

function extractCVSS(text) {
  const match = text.match(/CVSS[:\s]*([0-9.]+)/i);
  return match ? match[1] : null;
}

// --- INIT ---
loadFeeds();
</script>
<footer>
  <small style="font-family:garamond; font-size:10px; color:white">
    © Ikenna Ezeodurukwe 2026 - All Rights Reserved
  </small>
</footer>
</body>


</html>
