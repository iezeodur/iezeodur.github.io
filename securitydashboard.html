<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>afrodaemon</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia|Trirong|Pacifico|Cinzel|Sacramento|Gochi Hand">

<style>

/* HEADER */
header {
  color: white;
  font-family: Pacifico, sans-serif;
  font-size: 25px;
  text-align: center;
  background: #413839;
  
}

header a {
  color: white;
  text-decoration: none;
}

header p {
  color: white;
  font-family: "Cinzel", serif;
  font-size: 14px;
  background: #1C1C1C;
  margin: 5px 0 0;
  padding: 6px;
}

/* BODY */
body {
  font-family: sans-serif;
  background: #d3d3d3;
  color: #e2e8f0;
  padding: 10px;
}

/* 🔥 MASONRY */
.feed-container {
  column-count: 3;
  column-gap: 28px;
  padding: 30px 24px;
  max-width: 1200px;
  margin: auto;
}

@media (max-width: 1000px) {
  .feed-container { column-count: 2; }
}

@media (max-width: 600px) {
  .feed-container { column-count: 1; }
}

/* 🍎 CARD */
.post {
  display: inline-block;
  width: 100%;
  margin-bottom: 28px;
  background: #F5F5F5;
  border-radius: 16px;
  overflow: hidden;
  transition: 0.25s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.post:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 22px rgba(0,0,0,0.12);
}

/* FEATURED */
.featured {
  border-left: 4px solid #ce5c38;
}

/* IMAGE */
.thumb {
  width: 100%;
  height: auto;
  display: block;
}

/* SECTIONS */
.section {
  padding: 14px 16px;
}

/* TITLE */
.title {
  font-family: "Cinzel", serif;
  font-size: 18px;
  font-weight: bold;
  color: #1C1C1C;
  text-decoration: none;
  display: block;
  margin-bottom: 6px;
}

/* DESCRIPTION */
.desc {
  font-size: 14px;
  color: #5E7D7E;
  line-height: 1.6;
}

/* DIVIDER */
.divider {
  height: 1px;
  background: #E5E4E2;
}

/* META BAR */
.meta-bar {
  font-size: 12px;
  color: #64748b;
  display: flex;
  justify-content: space-between;
}

/* SOURCE COLORS */
.source {
  font-weight: bold;
}

.krebs { color: #facc15; }
.bleep { color: #4ade80; }
.secweek { color: #fb7185; }
.hacker { color: #a78bfa; }

/* CVE SECTION */
.cve-section {
  background: #ECECEC;
}

.cve {
  font-size: 12px;
  background: #52595D;
  color: white;
  padding: 8px;
  border-radius: 8px;
  margin-top: 6px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #ce5c38;
  color: white;
  font-size: 12px;
}

</style>
</head>

<body>

<header>
  <a href="https://www.linkedin.com/company/afrodaemon">afrodaemon</a>
  <p>👨🏿‍💻 Cybersecurity News & CVE Dashboard</p>
</header>

<div class="feed-container" id="feed"></div>

<script>

// FEEDS
const feeds = [
  { url: "https://api.rss2json.com/v1/api.json?rss_url=https://krebsonsecurity.com/feed/", source: "Krebs", class: "krebs" },
  { url: "https://api.rss2json.com/v1/api.json?rss_url=https://www.bleepingcomputer.com/feed/", source: "BleepingComputer", class: "bleep" },
  { url: "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/securityweek", source: "SecurityWeek", class: "secweek" },
  { url: "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/TheHackersNews", source: "Hacker News", class: "hacker" }
];

const cveRegex = /CVE-\d{4}-\d{4,7}/gi;

// CLEAN TEXT
function cleanDescription(html) {
  if (!html) return "";
  let text = html.replace(/<[^>]*>/g, "");

  const txt = document.createElement("textarea");
  txt.innerHTML = text;
  text = txt.value;

  return text.length > 300 ? text.substring(0, 300) + "..." : text;
}

// LOAD
async function loadFeeds() {
  let allPosts = [];

  for (let feed of feeds) {
    try {
      const res = await fetch(feed.url);
      const data = await res.json();

      const posts = data.items.map(item => {
        const fullText = (item.title || "") + " " + (item.description || "");

        let image = item.thumbnail || "";

        if (!image && item.enclosure?.link) {
          image = item.enclosure.link;
        }

        if (!image && item.description) {
          const imgMatch = item.description.match(/<img.*?src="(.*?)"/i);
          if (imgMatch) image = imgMatch[1];
        }

        return {
          title: item.title,
          link: item.link,
          date: new Date(item.pubDate),
          source: feed.source,
          class: feed.class,
          cves: extractCVEData(fullText),
          image: image,
          description: cleanDescription(item.description)
        };
      });

      allPosts = allPosts.concat(posts);
    } catch (err) {
      console.error(err);
    }
  }

  allPosts.sort((a, b) => b.date - a.date);
  displayPosts(allPosts.slice(0, 15));
}

// DISPLAY
function displayPosts(posts) {
  const container = document.getElementById("feed");
  container.innerHTML = "";

  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    if (post.cves.length >= 2) {
      div.classList.add("featured");
    }

    div.innerHTML = `
      ${post.image ? `<img src="${post.image}" class="thumb">` : ""}

      <div class="section">
        <a href="${post.link}" target="_blank" class="title">
          ${post.title}
        </a>

        <p class="desc">${post.description}</p>
      </div>

      <div class="divider"></div>

      <div class="section meta-bar">
        <span>${post.date.toLocaleString()}</span>
        <span class="source ${post.class}">${post.source}</span>
      </div>

      ${post.cves.length ? `
        <div class="divider"></div>

        <div class="section cve-section">
          ${post.cves.map(c => `
            <div class="cve">
              🔎 ${c.cve}
              ${c.severity ? ` • ${c.severity}` : ""}
              ${c.cvss ? ` • CVSS ${c.cvss}` : ""}
            </div>
          `).join("")}
        </div>
      ` : ""}
    `;

    container.appendChild(div);
  });
}

// CVE
function extractCVEData(text) {
  const results = [];
  const cves = text.match(cveRegex) || [];

  cves.forEach(cve => {
    results.push({
      cve: cve.toUpperCase(),
      severity: extractSeverity(text),
      cvss: extractCVSS(text)
    });
  });

  return results;
}

function extractSeverity(text) {
  const levels = ["Critical", "High", "Medium", "Low"];
  for (let level of levels) {
    if (text.toLowerCase().includes(level.toLowerCase())) return level;
  }
  return null;
}

function extractCVSS(text) {
  const match = text.match(/CVSS[:\s]*([0-9.]+)/i);
  return match ? match[1] : null;
}

// INIT
loadFeeds();

</script>

<footer>
  © Ikenna Ezeodurukwe 2026
</footer>

</body>
</html>
